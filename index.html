<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Maker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 16px;
    letter-spacing: 2px;
    color: #e94560;
    text-shadow: 0 0 12px #e9456088;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 14px;
    background: #16213e;
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid #0f3460;
  }

  .tool-btn {
    padding: 6px 14px;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    background: #0f3460;
    color: #eee;
    transition: all 0.15s;
  }
  .tool-btn:hover { background: #e94560; }
  .tool-btn.active { border-color: #e94560; background: #e94560; }

  #color-picker-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
  }
  #color-picker {
    width: 36px; height: 36px;
    border: none; border-radius: 6px; cursor: pointer;
    padding: 2px;
    background: transparent;
  }

  #palette {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    max-width: 220px;
  }
  .swatch {
    width: 24px; height: 24px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.2); border-color: #fff8; }
  .swatch.selected { border-color: #fff; transform: scale(1.15); }

  #grid-size-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
  }
  #grid-size {
    width: 60px;
    padding: 4px;
    background: #0f3460;
    color: #eee;
    border: 1px solid #e94560;
    border-radius: 6px;
    text-align: center;
  }

  #canvas-wrap {
    border: 2px solid #0f3460;
    border-radius: 4px;
    cursor: crosshair;
    image-rendering: pixelated;
    box-shadow: 0 0 30px #e9456033;
  }

  #actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .action-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  #btn-clear { background: #e94560; color: #fff; }
  #btn-clear:hover { background: #c73652; }
  #btn-save { background: #4ecca3; color: #1a1a2e; }
  #btn-save:hover { background: #39b38d; }
  #btn-fill { background: #0f3460; color: #eee; border: 2px solid #4ecca3; }
  #btn-fill:hover { background: #4ecca3; color: #1a1a2e; }
  #btn-grid-toggle { background: #0f3460; color: #eee; border: 2px solid #e9456088; }
  #btn-grid-toggle:hover { background: #e9456044; }
</style>
</head>
<body>

<h1>🎨 Pixel Art Maker</h1>

<div id="toolbar">
  <!-- Tool buttons -->
  <div style="display:flex;gap:6px;">
    <button class="tool-btn active" id="tool-pen" title="ペン">✏️ ペン</button>
    <button class="tool-btn" id="tool-eraser" title="消しゴム">🧹 消しゴム</button>
    <button class="tool-btn" id="tool-bucket" title="塗りつぶし">🪣 塗りつぶし</button>
    <button class="tool-btn" id="tool-eyedropper" title="スポイト">💉 スポイト</button>
  </div>

  <!-- Color picker -->
  <div id="color-picker-wrap">
    <label for="color-picker">色:</label>
    <input type="color" id="color-picker" value="#e94560">
  </div>

  <!-- Palette -->
  <div id="palette"></div>

  <!-- Grid size -->
  <div id="grid-size-wrap">
    <label for="grid-size">グリッド:</label>
    <input type="number" id="grid-size" value="16" min="4" max="64">
    <button class="tool-btn" id="btn-apply-size">適用</button>
  </div>
</div>

<canvas id="canvas-wrap"></canvas>

<div id="actions">
  <button class="action-btn" id="btn-clear">🗑 クリア</button>
  <button class="action-btn" id="btn-grid-toggle">グリッド線: ON</button>
  <button class="action-btn" id="btn-save">💾 PNG 保存</button>
</div>

<script>
const PALETTE = [
  '#000000','#ffffff','#e94560','#4ecca3','#f5a623',
  '#7ed321','#4a90e2','#9b59b6','#1abc9c','#e67e22',
  '#ecf0f1','#95a5a6','#2c3e50','#e74c3c','#3498db',
  '#2ecc71','#f39c12','#8e44ad','#16a085','#d35400',
];

const canvas = document.getElementById('canvas-wrap');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('color-picker');
const gridSizeInput = document.getElementById('grid-size');

let COLS = 16, ROWS = 16;
const CELL = 30; // px per cell on screen
let pixels = [];
let currentColor = '#e94560';
let currentTool = 'pen';
let isDrawing = false;
let showGrid = true;

function initPixels() {
  pixels = Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

function resize() {
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  render();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background checkerboard (transparent indicator)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const light = (r + c) % 2 === 0;
      ctx.fillStyle = light ? '#2a2a3e' : '#1e1e30';
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // Pixels
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (pixels[r][c]) {
        ctx.fillStyle = pixels[r][c];
        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      }
    }
  }

  // Grid lines
  if (showGrid) {
    ctx.strokeStyle = '#ffffff18';
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * CELL);
      ctx.lineTo(COLS * CELL, r * CELL);
      ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(c * CELL, 0);
      ctx.lineTo(c * CELL, ROWS * CELL);
      ctx.stroke();
    }
  }
}

function getCell(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  return { c: Math.floor(x / CELL), r: Math.floor(y / CELL) };
}

function paint(e) {
  const { c, r } = getCell(e);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;

  if (currentTool === 'pen') {
    pixels[r][c] = currentColor;
    render();
  } else if (currentTool === 'eraser') {
    pixels[r][c] = null;
    render();
  } else if (currentTool === 'eyedropper') {
    const col = pixels[r][c];
    if (col) {
      currentColor = col;
      colorPicker.value = col;
      updateSwatches();
      setTool('pen');
    }
  } else if (currentTool === 'bucket') {
    floodFill(r, c, pixels[r][c], currentColor);
    render();
  }
}

function floodFill(r, c, target, replacement) {
  if (target === replacement) return;
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  if (pixels[r][c] !== target) return;
  pixels[r][c] = replacement;
  floodFill(r+1, c, target, replacement);
  floodFill(r-1, c, target, replacement);
  floodFill(r, c+1, target, replacement);
  floodFill(r, c-1, target, replacement);
}

canvas.addEventListener('mousedown', e => { isDrawing = true; paint(e); });
canvas.addEventListener('mousemove', e => { if (isDrawing) paint(e); });
canvas.addEventListener('mouseup', () => isDrawing = false);
canvas.addEventListener('mouseleave', () => isDrawing = false);

// Touch support
canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; paint(e.touches[0]); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing) paint(e.touches[0]); }, {passive:false});
canvas.addEventListener('touchend', () => isDrawing = false);

colorPicker.addEventListener('input', e => {
  currentColor = e.target.value;
  updateSwatches();
});

function setTool(name) {
  currentTool = name;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + name)?.classList.add('active');
  canvas.style.cursor = name === 'eyedropper' ? 'crosshair' : name === 'eraser' ? 'cell' : 'crosshair';
}

document.getElementById('tool-pen').addEventListener('click', () => setTool('pen'));
document.getElementById('tool-eraser').addEventListener('click', () => setTool('eraser'));
document.getElementById('tool-bucket').addEventListener('click', () => setTool('bucket'));
document.getElementById('tool-eyedropper').addEventListener('click', () => setTool('eyedropper'));

// Palette
const paletteEl = document.getElementById('palette');
function buildPalette() {
  paletteEl.innerHTML = '';
  PALETTE.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (col === currentColor ? ' selected' : '');
    sw.style.background = col;
    sw.title = col;
    sw.addEventListener('click', () => {
      currentColor = col;
      colorPicker.value = col;
      updateSwatches();
    });
    paletteEl.appendChild(sw);
  });
}
function updateSwatches() {
  document.querySelectorAll('.swatch').forEach((sw, i) => {
    sw.classList.toggle('selected', PALETTE[i] === currentColor);
  });
}
buildPalette();

// Grid size apply
document.getElementById('btn-apply-size').addEventListener('click', () => {
  const v = parseInt(gridSizeInput.value);
  if (v >= 4 && v <= 64) {
    COLS = v; ROWS = v;
    initPixels();
    resize();
  }
});

// Clear
document.getElementById('btn-clear').addEventListener('click', () => {
  if (confirm('キャンバスをクリアしますか？')) {
    initPixels();
    render();
  }
});

// Grid toggle
const gridToggle = document.getElementById('btn-grid-toggle');
gridToggle.addEventListener('click', () => {
  showGrid = !showGrid;
  gridToggle.textContent = `グリッド線: ${showGrid ? 'ON' : 'OFF'}`;
  render();
});

// Save PNG
document.getElementById('btn-save').addEventListener('click', () => {
  // Render clean version (no grid) at pixel scale
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = COLS;
  exportCanvas.height = ROWS;
  const ectx = exportCanvas.getContext('2d');
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (pixels[r][c]) {
        ectx.fillStyle = pixels[r][c];
        ectx.fillRect(c, r, 1, 1);
      }
    }
  }
  const link = document.createElement('a');
  link.download = 'pixel-art.png';
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'p') setTool('pen');
  if (e.key === 'e') setTool('eraser');
  if (e.key === 'b') setTool('bucket');
  if (e.key === 'i') setTool('eyedropper');
  if (e.key === 'g') gridToggle.click();
});

// Init
initPixels();
resize();
</script>
</body>
</html>
